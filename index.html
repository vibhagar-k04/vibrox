<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
}

.container{
    text-align:center;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#4285F4;
    margin-bottom:30px;
}

form{
    display:flex;
    justify-content:center;
}

input{
    width:500px;
    max-width:90%;
    padding:15px 20px;
    border:1px solid #dcdcdc;
    border-radius:30px;
    outline:none;
    font-size:18px;
    box-shadow:0 1px 6px rgba(32,33,36,.28);
}

input:focus{
    box-shadow:0 2px 10px rgba(32,33,36,.35);
}

button{
    margin-left:10px;
    padding:15px 25px;
    border:none;
    border-radius:30px;
    background:#4285F4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3367D6;
}

#status{
    margin-top:20px;
    color:green;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Search</div>

<form id="searchForm">
    <input
        type="text"
        id="search"
        name="search"
        placeholder="Search..."
        required
    >
    <button type="submit">Search</button>
</form>

<p id="status"></p>

</div>

<script>
const form = document.getElementById("searchForm");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const searchText = document.getElementById("search").value;

    const response = await fetch("https://formspree.io/f/mwvdwjjk", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({
            search: searchText
        })
    });

    if(response.ok){
        document.getElementById("status").innerHTML = "Search submitted successfully!";
        form.reset();
    }else{
        document.getElementById("status").innerHTML = "Something went wrong.";
    }
});
</script>

</body>
</html>
